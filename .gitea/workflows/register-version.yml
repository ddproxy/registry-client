name: Register Version

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  register:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version metadata
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"

          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${TAG}$" | head -1)
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${TAG}"
          else
            RANGE="${TAG}"
          fi
          CHANGELOG=$(git log "$RANGE" --pretty=format:"%s" --no-merges | head -20)

          LICENSE=$(jq -r '.license // "MIT"' package.json)
          RAW_NAME=$(jq -r '.name' package.json)
          PROJECT_NAME="${RAW_NAME##*/}"

          ASSET_SOURCE="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/archive/refs/tags/${TAG}.tar.gz"
          REPO_TAG_GITEA="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${TAG}"

          REPO_TAG_GITHUB=""
          if [ -n "${{ vars.GITHUB_MIRROR_URL }}" ]; then
            REPO_TAG_GITHUB="${{ vars.GITHUB_MIRROR_URL }}/releases/tag/${TAG}"
          fi

          echo "version=${TAG}" >> $GITHUB_OUTPUT
          echo "project_name=${PROJECT_NAME}" >> $GITHUB_OUTPUT
          echo "license=${LICENSE}" >> $GITHUB_OUTPUT
          echo "asset_source=${ASSET_SOURCE}" >> $GITHUB_OUTPUT
          echo "repo_tag_github=${REPO_TAG_GITHUB}" >> $GITHUB_OUTPUT
          echo "repo_tag_gitea=${REPO_TAG_GITEA}" >> $GITHUB_OUTPUT
          {
            echo "changelog<<EOF"
            echo "$CHANGELOG"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Register version in registry
        uses: ddproxy/registry-actions/actions/add-version@v0.1.0
        with:
          project_name: ${{ steps.meta.outputs.project_name }}
          version: ${{ steps.meta.outputs.version }}
          changelog: ${{ steps.meta.outputs.changelog }}
          asset_source: ${{ steps.meta.outputs.asset_source }}
          repo_tag_github: ${{ steps.meta.outputs.repo_tag_github }}
          repo_tag_gitea: ${{ steps.meta.outputs.repo_tag_gitea }}
          license: ${{ steps.meta.outputs.license }}
          registry_repo: registry
          registry_owner: ${{ vars.GITEA_ORG || github.repository_owner }}
          github_token: ${{ secrets.GITEA_REGISTRY_TOKEN }}
