# Gitea variant of update-version.yml.
# Patches an existing version record in the Gitea-hosted registry.
#
# Required secrets:
#   GITEA_REGISTRY_TOKEN  - A Gitea token with write access to the registry repo
#
# Optional repository variables:
#   GITEA_ORG          - Gitea org (defaults to repository owner)
#   GITHUB_MIRROR_URL  - Full GitHub repo URL if mirrored (e.g. https://github.com/ddproxy/my-repo)

name: Update Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to update (e.g. v1.0.0)'
        required: true
      changelog:
        description: 'Replacement changelog, one entry per line (leave blank to keep existing)'
        required: false
      asset_source:
        description: 'New source asset URL (leave blank to keep existing)'
        required: false
      asset_binary:
        description: 'New binary asset URL (leave blank to keep existing)'
        required: false
      repo_tag_github:
        description: 'New GitHub tag URL (leave blank to auto-build from GITHUB_MIRROR_URL)'
        required: false
      repo_tag_gitea:
        description: 'New Gitea tag URL (leave blank to auto-build from server URL)'
        required: false
      license:
        description: 'New license (leave blank to keep existing)'
        required: false

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Resolve project name and tag URLs
        id: meta
        run: |
          if [ -f "package.json" ]; then
            RAW_NAME=$(jq -r '.name' package.json)
            PROJECT_NAME="${RAW_NAME##*/}"
          else
            PROJECT_NAME="${GITHUB_REPOSITORY##*/}"
          fi

          REPO_TAG_GITEA="${{ inputs.repo_tag_gitea }}"
          [ -z "$REPO_TAG_GITEA" ] && \
            REPO_TAG_GITEA="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${{ inputs.version }}"

          REPO_TAG_GITHUB="${{ inputs.repo_tag_github }}"
          if [ -z "$REPO_TAG_GITHUB" ] && [ -n "${{ vars.GITHUB_MIRROR_URL }}" ]; then
            REPO_TAG_GITHUB="${{ vars.GITHUB_MIRROR_URL }}/releases/tag/${{ inputs.version }}"
          fi

          echo "project_name=${PROJECT_NAME}" >> $GITHUB_OUTPUT
          echo "repo_tag_gitea=${REPO_TAG_GITEA}" >> $GITHUB_OUTPUT
          echo "repo_tag_github=${REPO_TAG_GITHUB}" >> $GITHUB_OUTPUT

      - name: Update version in registry
        uses: ddproxy/registry-actions/actions/update-version@v0.1.0
        with:
          project_name: ${{ steps.meta.outputs.project_name }}
          version: ${{ inputs.version }}
          changelog: ${{ inputs.changelog }}
          asset_source: ${{ inputs.asset_source }}
          asset_binary: ${{ inputs.asset_binary }}
          repo_tag_github: ${{ steps.meta.outputs.repo_tag_github }}
          repo_tag_gitea: ${{ steps.meta.outputs.repo_tag_gitea }}
          license: ${{ inputs.license }}
          registry_repo: registry
          registry_owner: ${{ vars.GITEA_ORG || github.repository_owner }}
          github_token: ${{ secrets.GITEA_REGISTRY_TOKEN }}
