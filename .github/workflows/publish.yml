name: publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Registry version to create or patch (e.g. v1.0.0). Leave blank to skip registry update.'
        required: false
      changelog:
        description: 'Changelog entries, one per line (auto-built from git log on tag push)'
        required: false
      repo_tag_gitea:
        description: 'Gitea tag URL (auto-built from GITEA_BASE_URL+GITEA_ORG if set)'
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install safe-chain
        run: curl -fsSL https://github.com/AikidoSec/safe-chain/releases/latest/download/install-safe-chain.sh | sh -s -- --ci

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to GitHub
        if: github.repository_owner == 'ddproxy'
        run: npm publish --registry=https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to Gitea
        if: secrets.GITEA_NPM_REGISTRY_URL != '' && secrets.GITEA_TOKEN != ''
        run: npm publish --registry=${{ secrets.GITEA_NPM_REGISTRY_URL }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITEA_TOKEN }}

      - name: Publish to NPM
        if: secrets.NPM_TOKEN != ''
        run: npm publish --registry=https://registry.npmjs.org
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Resolve registry metadata
        id: meta
        if: github.event_name == 'push' || inputs.version != ''
        run: |
          TAG="${{ github.event_name == 'push' && github.ref_name || inputs.version }}"

          LICENSE=$(jq -r '.license // "MIT"' package.json)
          RAW_NAME=$(jq -r '.name' package.json)
          PROJECT_NAME="${RAW_NAME##*/}"

          CHANGELOG="${{ inputs.changelog }}"
          if [ -z "$CHANGELOG" ] && [ "${{ github.event_name }}" = "push" ]; then
            PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${TAG}$" | head -1)
            if [ -n "$PREV_TAG" ]; then
              CHANGELOG=$(git log "${PREV_TAG}..${TAG}" --pretty=format:"%s" --no-merges | head -20)
            else
              CHANGELOG=$(git log "${TAG}" --pretty=format:"%s" --no-merges | head -20)
            fi
          fi

          ASSET_SOURCE="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${TAG}.tar.gz"
          REPO_TAG_GITHUB="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${TAG}"

          REPO_TAG_GITEA="${{ inputs.repo_tag_gitea }}"
          if [ -z "$REPO_TAG_GITEA" ] && [ -n "${{ vars.GITEA_BASE_URL }}" ] && [ -n "${{ vars.GITEA_ORG }}" ]; then
            REPO_TAG_GITEA="${{ vars.GITEA_BASE_URL }}/${{ vars.GITEA_ORG }}/${PROJECT_NAME}/releases/tag/${TAG}"
          fi

          echo "version=${TAG}" >> $GITHUB_OUTPUT
          echo "project_name=${PROJECT_NAME}" >> $GITHUB_OUTPUT
          echo "license=${LICENSE}" >> $GITHUB_OUTPUT
          echo "asset_source=${ASSET_SOURCE}" >> $GITHUB_OUTPUT
          echo "repo_tag_github=${REPO_TAG_GITHUB}" >> $GITHUB_OUTPUT
          echo "repo_tag_gitea=${REPO_TAG_GITEA}" >> $GITHUB_OUTPUT
          {
            echo "changelog<<EOF"
            echo "$CHANGELOG"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Upsert version in registry
        if: github.event_name == 'push' || inputs.version != ''
        uses: ddproxy/registry-actions/actions/upsert-version@v0.1.0
        with:
          project_name: ${{ steps.meta.outputs.project_name }}
          version: ${{ steps.meta.outputs.version }}
          changelog: ${{ steps.meta.outputs.changelog }}
          asset_source: ${{ steps.meta.outputs.asset_source }}
          repo_tag_github: ${{ steps.meta.outputs.repo_tag_github }}
          repo_tag_gitea: ${{ steps.meta.outputs.repo_tag_gitea }}
          license: ${{ steps.meta.outputs.license }}
          registry_repo: project-registry
          registry_owner: ddproxy
          github_token: ${{ secrets.REGISTRY_TOKEN }}
