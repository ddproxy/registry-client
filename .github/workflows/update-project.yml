# Patch this repository's project record in the ddproxy registry.
# Only fields provided at dispatch time are updated; all others are left unchanged.
# Common uses: adding a Gitea URL after initial GitHub-only registration,
# correcting a description, updating license.
#
# Required secrets:
#   REGISTRY_TOKEN  - A token with write access to the registry repository
#
# Optional repository variables:
#   GITEA_BASE_URL  - Base URL of your Gitea instance (e.g. https://git.example.com)
#   GITEA_ORG       - Gitea org that owns this repo (e.g. com.example)

name: Update Project

on:
  workflow_dispatch:
    inputs:
      display_name:
        description: 'New display name (leave blank to keep existing)'
        required: false
      description:
        description: 'New description (leave blank to keep existing)'
        required: false
      repo_gitea:
        description: 'Gitea repository URL (leave blank to keep existing; auto-built from GITEA_BASE_URL+GITEA_ORG if set)'
        required: false
      repo_github:
        description: 'GitHub repository URL (leave blank to keep existing)'
        required: false
      tags:
        description: 'Replacement comma-separated tags (leave blank to keep existing)'
        required: false
      license:
        description: 'New license (leave blank to keep existing)'
        required: false

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Resolve project name and Gitea URL
        id: meta
        run: |
          if [ -f "package.json" ]; then
            RAW_NAME=$(jq -r '.name' package.json)
            PROJECT_NAME="${RAW_NAME##*/}"
          else
            PROJECT_NAME="${GITHUB_REPOSITORY##*/}"
          fi

          REPO_GITEA="${{ inputs.repo_gitea }}"
          if [ -z "$REPO_GITEA" ] && [ -n "${{ vars.GITEA_BASE_URL }}" ] && [ -n "${{ vars.GITEA_ORG }}" ]; then
            REPO_GITEA="${{ vars.GITEA_BASE_URL }}/${{ vars.GITEA_ORG }}/${PROJECT_NAME}"
          fi

          echo "project_name=${PROJECT_NAME}" >> $GITHUB_OUTPUT
          echo "repo_gitea=${REPO_GITEA}" >> $GITHUB_OUTPUT

      - name: Update project in registry
        uses: ddproxy/registry-actions/actions/update-project@v0.1.0
        with:
          project_name: ${{ steps.meta.outputs.project_name }}
          display_name: ${{ inputs.display_name }}
          description: ${{ inputs.description }}
          repo_github: ${{ inputs.repo_github }}
          repo_gitea: ${{ steps.meta.outputs.repo_gitea }}
          tags: ${{ inputs.tags }}
          license: ${{ inputs.license }}
          registry_repo: project-registry
          registry_owner: ddproxy
          github_token: ${{ secrets.REGISTRY_TOKEN }}
