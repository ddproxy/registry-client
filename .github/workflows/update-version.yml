# Patch an existing version record for this project in the ddproxy registry.
# Only fields provided at dispatch time are updated; all others are left unchanged.
# Common uses: adding a Gitea tag URL after initial GitHub-only registration,
# correcting asset URLs or changelog entries.
#
# Required secrets:
#   REGISTRY_TOKEN  - A token with write access to the registry repository
#
# Optional repository variables:
#   GITEA_BASE_URL  - Base URL of your Gitea instance (e.g. https://git.example.com)
#   GITEA_ORG       - Gitea org that owns this repo (e.g. com.example)

name: Update Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to update (e.g. v1.0.0)'
        required: true
      changelog:
        description: 'Replacement changelog, one entry per line (leave blank to keep existing)'
        required: false
      asset_source:
        description: 'New source asset URL (leave blank to keep existing)'
        required: false
      asset_binary:
        description: 'New binary asset URL (leave blank to keep existing)'
        required: false
      repo_tag_github:
        description: 'New GitHub tag URL (leave blank to keep existing)'
        required: false
      repo_tag_gitea:
        description: 'Gitea tag URL (leave blank to keep existing; auto-built from GITEA_BASE_URL+GITEA_ORG if set)'
        required: false
      license:
        description: 'New license (leave blank to keep existing)'
        required: false

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Resolve project name and Gitea tag URL
        id: meta
        run: |
          if [ -f "package.json" ]; then
            RAW_NAME=$(jq -r '.name' package.json)
            PROJECT_NAME="${RAW_NAME##*/}"
          else
            PROJECT_NAME="${GITHUB_REPOSITORY##*/}"
          fi

          REPO_TAG_GITEA="${{ inputs.repo_tag_gitea }}"
          if [ -z "$REPO_TAG_GITEA" ] && [ -n "${{ vars.GITEA_BASE_URL }}" ] && [ -n "${{ vars.GITEA_ORG }}" ]; then
            REPO_TAG_GITEA="${{ vars.GITEA_BASE_URL }}/${{ vars.GITEA_ORG }}/${PROJECT_NAME}/releases/tag/${{ inputs.version }}"
          fi

          echo "project_name=${PROJECT_NAME}" >> $GITHUB_OUTPUT
          echo "repo_tag_gitea=${REPO_TAG_GITEA}" >> $GITHUB_OUTPUT

      - name: Update version in registry
        uses: ddproxy/registry-actions/actions/update-version@v0.1.0
        with:
          project_name: ${{ steps.meta.outputs.project_name }}
          version: ${{ inputs.version }}
          changelog: ${{ inputs.changelog }}
          asset_source: ${{ inputs.asset_source }}
          asset_binary: ${{ inputs.asset_binary }}
          repo_tag_github: ${{ inputs.repo_tag_github }}
          repo_tag_gitea: ${{ steps.meta.outputs.repo_tag_gitea }}
          license: ${{ inputs.license }}
          registry_repo: project-registry
          registry_owner: ddproxy
          github_token: ${{ secrets.REGISTRY_TOKEN }}
